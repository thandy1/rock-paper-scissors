<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Rock Paper Scissors</title>
</head>
<body>

    <header>
        <div id="header-container">
            <!-- Scoreboard -->
            <div id="scoreboard">
                <div id="player">
                    <p class="white">Player</p>
                    <span id="player-score" class="white">0</span>
                </div>
                <div id="round">
                    <p class="white">Round</p>
                    <span id="round-indicator" class="white">1</span>
                </div>
                <div id="computer" class="white">
                    <p class="white">Computer</p>
                    <span id="computer-score" class="white">0</span>
                </div>
            </div>
            <!-- Quit button -->
            <button type="button" id="quit-button" class="dark-gray">✕</button>
        </div>
    </header>

    <main>
        <!-- Result display -->
        <p id="result-message" class="yellow">SELECT YOUR HAND</p>
        <p id="game-over-message"></p>
        <button type="button" id="play-again-button" class="dark-gray">Play Again?</button>
    

        <!-- Choices container -->
        <div id="choices-container">
            <div id="choices">
                <button type="button" class="choice-button" data-choice="rock">
                    <span class="choice-icon">✊</span>
                    <p class="dark-gray">ROCK</p>
                </button>
                <button type="button" class="choice-button"  data-choice="paper">
                    <span class="choice-icon">🖐</span>
                    <p class="dark-gray">PAPER</p>
                </button>
                <button type="button" class="choice-button" data-choice="scissors">
                    <span class="choice-icon">✌️</span>
                    <p class="dark-gray">SCISSORS</p>
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p class="white">Made by Terren Handy &copy; 2026</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
